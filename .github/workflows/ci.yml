name: CI

on:
  push:
    branches: [ main, master ]
    paths:
      - backend/**
      - package.json
      - package-lock.json
      - .github/workflows/ci.yml
  pull_request:
    branches: [ main, master ]
    paths:
      - backend/**
      - package.json
      - package-lock.json
      - .github/workflows/ci.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps (backend workspace)
        run: npm install --workspace backend
      - name: Lint (backend)
        run: npm run lint --workspace backend --if-present
      - name: Typecheck (backend)
        run: npm run typecheck --workspace backend --if-present
      - name: Test (backend)
        run: npm run test --workspace backend --if-present

