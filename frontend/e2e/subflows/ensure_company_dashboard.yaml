appId: com.anonymous.msuperapp
---
# If we are on the selector, tap Company Workspace
- runFlow:
    when:
      visible: "Choose Workspace"
    commands:
      - tapOn: "Company Workspace"

# If we are not on Company Dashboard, try pressing back
- runFlow:
    when:
      notVisible: "Company Dashboard"
    commands:
      - back

- runFlow:
    when:
      notVisible: "Company Dashboard"
    commands:
      - back

# If we are on Super Admin Dashboard ("System Console"), open drawer and log out
- runFlow:
    when:
      visible: "System Console"
    commands:
      # Swipe from left edge to open drawer
      - swipe:
          start: "0%, 50%"
          end: "80%, 50%"
      - tapOn: "Logout"
      - tapOn: "Company Workspace"

# Assert we are on the Company Dashboard
- assertVisible: "Company Dashboard"
