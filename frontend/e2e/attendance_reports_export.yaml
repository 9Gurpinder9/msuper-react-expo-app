appId: com.anonymous.msuperapp
---
# 1. If not on Reports screen, navigate to it via drawer
- runFlow:
    when:
      notVisible: "Attendance Reports"
    commands:
      # Swipe right from left edge to open the drawer
      - swipe:
          start: "0%, 50%"
          end: "80%, 50%"
      # Tap on Attendance item in drawer
      - tapOn: "Attendance"
      # Tap on the view reports FAB
      - tapOn:
          id: "view-reports-fab"

# 2. Assert we are on the Attendance Reports screen
- assertVisible: "Attendance Reports"

# 3. Tap the Export FAB group to reveal options
- tapOn:
    id: "reports-fab-group"

# 4. Assert that the sub-actions (Excel Export, PDF Export) are visible
- assertVisible: "Excel Export"
- assertVisible: "PDF Export"

# 5. Tap the Excel Export action
- tapOn:
    id: "export-excel-action"

# 6. Dismiss the native share dialog
- back

# 7. Tap the Export FAB group again to reveal options
- tapOn:
    id: "reports-fab-group"

# 8. Tap the PDF Export action
- tapOn:
    id: "export-pdf-action"

# 9. Dismiss the native share dialog
- back
