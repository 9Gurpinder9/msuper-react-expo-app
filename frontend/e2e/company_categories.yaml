appId: host.exp.exponent
---
# 1. Guarantee we start on the Super Admin Dashboard Console
- runFlow: subflows/ensure_dashboard.yaml

# 2. Scroll down to expose hidden widgets and tap on the 'Company Categories' card
- scroll
- tapOn: "Company Categories"

# 3. Assert we arrived on the Company Categories listing screen
- assertVisible: "Company Categories"

