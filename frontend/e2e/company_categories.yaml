- assertVisible:
    id: "add-category-fab"
- tapOn:
    id: "add-category-fab"
- assertVisible: "Register New Category"
- tapOn:
    id: "category-name-input"
- inputText: "Agriculture & Farming"
- hideKeyboard
- tapOn:
    id: "save-category-button"
- assertNotVisible: "Register New Category"

