# frontend/.github/workflows/ci.yml
name: CI

on:
  pull_request:
  push:
    branches: [master, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      # optional sanity check; can be flaky in CI, enable later if you want
      # - name: Expo doctor
      #   run: npx expo doctor
